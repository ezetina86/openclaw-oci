#cloud-config

package_update: true
package_upgrade: true

packages:
  - podman
  - slirp4netns
  - curl
  - wget

runcmd:
  # Download and install cloudflared for ARM64
  - curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -o /usr/local/bin/cloudflared
  - chmod +x /usr/local/bin/cloudflared

  # Run official OpenClaw installer (non-interactive)
  - |
    # Ensure Node.js 22 is present as required by OpenClaw
    curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    apt-get install -y nodejs git
    
    # Run the installer script
    export OPENCLAW_NON_INTERACTIVE=true
    curl -fsSL https://openclaw.ai/install.sh | bash

  # Setup OpenClaw environment directories
  - mkdir -p /home/ubuntu/.openclaw
  - chown -R ubuntu:ubuntu /home/ubuntu/.openclaw

  # Write the Cloudflared service unit (Native Ingress)
  - |
    cat > /home/ubuntu/.config/systemd/user/cloudflared.service << 'EOF'
    [Unit]
    Description=Cloudflare Tunnel Daemon
    After=network-online.target
    Wants=network-online.target

    [Service]
    Type=simple
    # Looking for a token in the secure .openclaw directory
    # Pointing to the native OpenClaw port 18789
    ExecStart=/bin/bash -c "/usr/local/bin/cloudflared tunnel --no-autoupdate run --token $(cat /home/ubuntu/.openclaw/tunnel_token 2>/dev/null || echo 'MISSING_TOKEN')"
    Restart=always
    RestartSec=5
    TimeoutStartSec=0

    [Install]
    WantedBy=default.target
    EOF

  # Set permissions for systemd user configuration
  - chown -R ubuntu:ubuntu /home/ubuntu/.config

  # Enable and start cloudflared for the ubuntu user
  - su - ubuntu -c 'XDG_RUNTIME_DIR=/run/user/$(id -u ubuntu) systemctl --user daemon-reload'
  - su - ubuntu -c 'XDG_RUNTIME_DIR=/run/user/$(id -u ubuntu) systemctl --user enable --now cloudflared.service'
