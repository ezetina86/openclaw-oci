repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: local
    hooks:
      - id: tofu-fmt
        name: OpenTofu Format
        entry: bash -c 'cd infra && tofu fmt'
        language: system
        files: \.(tf|hcl)$
        pass_filenames: false
