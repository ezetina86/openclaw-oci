name: Infrastructure CI

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'dev'
      - 'main'
    paths:
      - 'infra/**'
      - '.github/workflows/infra-ci.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/infra-ci.yml'

env:
  TF_IN_AUTOMATION: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-infra:
    name: Validate OpenTofu Infrastructure
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      TF_VAR_compartment_id: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_budget_alert_email: "jenzetin@gmail.com"
      TF_VAR_availability_domain: "JdwO:US-CHICAGO-1-AD-1"
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2.0.0
        with:
          tofu_wrapper: false

      - name: Tofu Format Check
        run: tofu fmt -check
        working-directory: ./infra

      - name: Tofu Init
        run: tofu init
        working-directory: ./infra

      - name: Tofu Validate
        run: tofu validate
        working-directory: ./infra

      - name: Tofu Test
        run: tofu test
        working-directory: ./infra

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: infra
          framework: terraform
          soft_fail: false
          skip_check: CKV_OCI_4,CKV_OCI_5,CKV_OCI_19

      - name: Tofu Plan
        run: tofu plan -out=tfplan
        working-directory: ./infra

      - name: Tofu Apply
        if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        run: tofu apply -auto-approve tfplan
        working-directory: ./infra
